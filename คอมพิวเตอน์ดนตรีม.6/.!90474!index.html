        <section class="slide-item" id="slide-0">
          <div class="slide-content">
            <h2 class="slide-title">01. วิทยาศาสตร์คลื่นเสียงทางกายภาพ (Acoustic Physics)</h2>
            <p class="slide-subtitle-desc">การทำความเข้าใจธรรมชาติทางฟิสิกส์ของเสียงเป็นรากฐานของการบันทึกและการผสมเสียงอย่างมืออาชีพ</p>
            
            <div class="two-column">
              <div class="column" style="overflow-y: auto; max-height: calc(100% - 60px);">
                <div class="info-block">
                  <h3>1. ความถี่และความเร็วเสียง (Frequency & Velocity)</h3>
                  <p>เสียงคือคลื่นกลตามยาว (Longitudinal Wave) ที่อาศัยการสั่นสะเทือนแบบอัดและขยายผ่านตัวกลาง:</p>
                  <ul>
                    <li><strong>ความถี่ (Frequency - f):</strong> จำนวนรอบคลื่นต่อวินาที (Hz) กำหนด <strong>"ระดับเสียง (Pitch)"</strong> มนุษย์ได้ยินย่าน 20 - 20,000 Hz แบ่งย่อยเป็น:
                      <br>• <em>Bass (20-250 Hz):</em> พลังงานฐาน ความรู้สึกสั่นสะเทือน
                      <br>• <em>Mids (250-2,000 Hz):</em> ย่านเสียงร้องหลัก ที่หูมนุษย์รับรู้ได้ไวที่สุด
                      <br>• <em>Highs (2,000-20,000 Hz):</em> ความคมชัด มิติตัวโน้ต และความใส
                    </li>
                    <li><strong>ความเร็วเสียง (Velocity - v):</strong> แปรผันตามอุณหภูมิอากาศ (°C) ตามสูตร: <code class="kbd-key">v = 331 + 0.6T</code></li>
                  </ul>
                </div>
                
                <div class="info-block success-block">
                  <h3>2. แอมพลิจูด คาบ เฟส และสีสันเสียง (Amplitude, Wavelength, Phase & Timbre)</h3>
                  <ul>
                    <li><strong>แอมพลิจูด (Amplitude):</strong> ความสูงของยอดคลื่น สัมพันธ์กับ <strong>"ความดัง-เบา (Volume)"</strong> มีหน่วยวัดระดับไฟฟ้าเป็นเดซิเบล (dB)</li>
                    <li><strong>ความยาวคลื่น (Wavelength - λ):</strong> ระยะทางคลื่นใน 1 คาบเวลา คำนวณจากสูตร: <code class="kbd-key">λ = v / f</code></li>
                    <li><strong>เฟสเสียง (Phase):</strong> ตำแหน่งองศาของคลื่น (0°-360°) หากคลื่นหักล้างกัน 180° จะเกิด <strong>Phase Cancellation</strong> เสียงจะเงียบหายบี้แบน</li>
                    <li><strong>สีสันเสียง (Timbre):</strong> คุณลักษณะเสียงช่วยแยกประเภทเครื่องดนตรี เกิดจากสัดส่วนความถี่ประกอบย่อย (Harmonics & Overtones)</li>
                  </ul>
                </div>
              </div>
